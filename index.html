<!doctype html>
<html lang="es">
    <head>
        <title>Administrador de Tareas</title>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="style.css">
    </head>
  <body>
    <div class="kanban">
      <h1 class="title">Kanban Board</h1>
      <div class="input-section">
        <form id="agregar_tarea">
            <input type="text" id="tareaInput">
            <button type="submit" class="add-btn">AGREGAR</button>
        </form>   
      </div>
 
      <div class="container">
        <div id="incomplete" class="column">
          <h1>Incompleto</h1>
          <div class="task-list"></div>
        </div>
        <div id="complete" class="column">
          <h1>Completo</h1>
          <div class="task-list"></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
